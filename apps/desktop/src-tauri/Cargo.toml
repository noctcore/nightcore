[package]
name = "nightcore"
version = "0.0.0"
description = "Nightcore — an autonomous Claude dev studio"
authors = ["Shirone"]
edition = "2021"
rust-version = "1.77.2"

# The library target Tauri builds; `main.rs` is a thin shim that calls `run()`.
[lib]
name = "nightcore_lib"
crate-type = ["lib", "cdylib", "staticlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2.11.2", features = [] }
tauri-plugin-dialog = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4"] }
async-trait = "0.1"
tokio = { version = "1", features = [
    "macros",
    "rt-multi-thread",
    "process",
    "io-util",
    "sync",
    "time",
] }

[dev-dependencies]
tempfile = "3"
