# Publishes `@noctcore/harness` (the portable Structure-Lock runner, packages/harness)
# to npmjs.com — public, with npm provenance. Portable-lock PR 4, issue #134.
#
# Prerequisites (one-time, human-owned):
#   1. The `noctcore` npm org exists (created) and this package is `@noctcore/harness`.
#   2. An npm automation token is stored in the repo secret `NPM_TOKEN`.
#
# How to publish: push a tag `harness-v<version>` (e.g. `harness-v0.1.0`). The tag
# version MUST equal packages/harness/package.json `version` (a guard step enforces it).
# This tag namespace is SEPARATE from the app's `v*.*.*` (release.yml, Tauri build), so
# the two never collide. Merging a PR NEVER publishes — only a `harness-v*` tag push does.
#
# On a pull request that touches packages/harness/** this workflow runs a token-free PROOF
# job that builds the package and asserts (via `npm pack --dry-run`) that the tarball ships
# `dist/` + the `harness` bin and leaks no `src/`/tests — it never publishes (§7 test 12).
name: publish-harness

on:
  push:
    tags: ['harness-v*']
  pull_request:
    paths:
      - 'packages/harness/**'
      - '.github/workflows/publish-harness.yml'

permissions:
  contents: read

jobs:
  # PROOF — runs on PRs only. Proves the package is publishable WITHOUT a token or a
  # real publish, so the tarball shape is gated even before NPM_TOKEN is configured.
  proof:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run --filter @noctcore/harness build
      - name: Prove the tarball ships dist + bin and nothing leaked
        working-directory: packages/harness
        run: |
          echo "--- npm pack --dry-run ---"
          npm pack --dry-run
          FILES="$(npm pack --dry-run --json \
            | node -e "const d=JSON.parse(require('fs').readFileSync(0,'utf8'));console.log(d[0].files.map(f=>f.path).join('\n'))")"
          echo "--- tarball file list ---"
          echo "$FILES"
          echo "$FILES" | grep -qx 'dist/cli.js'   || { echo '::error::tarball is missing dist/cli.js (the harness bin)'; exit 1; }
          echo "$FILES" | grep -qx 'dist/index.js'  || { echo '::error::tarball is missing dist/index.js'; exit 1; }
          if echo "$FILES" | grep -qE '(^|/)src/|\.test\.'; then
            echo '::error::tarball leaked src/ or test files — files:["dist"] allowlist breached'; exit 1
          fi
          echo 'OK: tarball ships only dist/ (+ npm-default package.json/README).'

  # PUBLISH — the ONLY path that runs `npm publish`. Reachable exclusively via a
  # `harness-v*` tag push (the `if` requires a matching tag ref), never on a PR/branch.
  publish:
    if: startsWith(github.ref, 'refs/tags/harness-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance attestation
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - name: Assert the tag version matches package.json
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#harness-v}"
          PKG_VERSION="$(node -p "require('./packages/harness/package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::tag ${GITHUB_REF_NAME} implies ${TAG_VERSION} but packages/harness/package.json is ${PKG_VERSION}"
            exit 1
          fi
          echo "Publishing @noctcore/harness@${PKG_VERSION}"
      - run: bun run --filter @noctcore/harness build
      - run: bun run test:node
      - name: Publish to npm (public, with provenance)
        working-directory: packages/harness
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
