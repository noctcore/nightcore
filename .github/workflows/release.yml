name: release

# Unsigned macOS/Windows release pipeline (issue #16): minisign-verified updater
# artifacts published to GitHub Releases. No Apple/Windows code-signing secrets.
on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macos-13 is deprecated (GitHub changelog 2025-09-19). Both macOS arches
          # build on macos-latest per Tauri docs; sidecar cross-compile is handled
          # via NIGHTCORE_SIDECAR_TARGET + compile.ts (Option B).
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            sidecar_target: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            sidecar_target: x86_64-apple-darwin
          - platform: windows-latest
            args: ''
            sidecar_target: ''
    runs-on: ${{ matrix.platform }}
    env:
      NIGHTCORE_SIDECAR_TARGET: ${{ matrix.sidecar_target }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: dtolnay/rust-toolchain@stable
        with:
          # Match apps/desktop/src-tauri/rust-toolchain.toml (1.94.1).
          toolchain: 1.94.1
          # Tauri docs: install both macOS targets on every macos-latest leg.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
      - name: Ensure macOS Rust cross targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./apps/desktop/src-tauri -> target
      - run: bun install --frozen-lockfile
      # Workspace packages expose ./dist — beforeBuildCommand runs web build which
      # imports @nightcore/contracts et al.; same gate as CI's root `tsc -b`.
      - run: bun run build
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop/src-tauri
          tagName: v__VERSION__
          releaseName: Nightcore v__VERSION__
          releaseDraft: true
          prerelease: false
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}