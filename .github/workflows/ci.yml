name: CI

# The correctness gate the contributor docs promise. Runs on every push to main
# and every PR so the guardrails stated as fact in docs/architecture.md and
# packages/contracts/AGENTS.md are enforced, not aspirational:
#   - `bun run lint` runs lint:meta, whose codegen-drift rule is
#     `gen-rust-contracts.ts --check` (the zod→Rust drift guard) plus
#     agent-contract-parity — this is the "tools/lint-meta fails CI" gate.
#   - the Rust job re-runs the ts-rs codegen via `cargo test` and asserts no
#     `git diff` — this is the "CI asserts no git diff" guard.
# Dependency CVE scanning lives separately in audit.yml; this is the build/test
# correctness gate.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# A superseded PR push cancels the previous in-flight run for that ref (a
# frozen web-coverage step used to sit for 35+ minutes until someone noticed).
# Pushes to main keep per-commit runs: the group key includes the run id there,
# so nothing shares a group and nothing is cancelled.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref == 'refs/heads/main' && github.run_id || github.ref }}
  cancel-in-progress: true

jobs:
  # macOS-only lane for the Seatbelt (OS write-containment) proof. The
  # containment-enforcement tests in packages/engine/src/session/sandbox.test.ts
  # are `test.skipIf(!canSandbox)` — they need darwin + /usr/bin/sandbox-exec, so
  # on the ubuntu lanes above/below they always skip and the semantic guarantee of
  # this security feature is verified NOWHERE. This job runs the engine suite on a
  # real macOS runner so those tests (and `sandboxAvailable() === true`) actually
  # execute on every push, catching a containment regression that still emits a
  # well-formed profile string. Scoped to `packages/engine` to keep macOS minutes
  # (billed at a premium) small.
  macos-sandbox:
    name: seatbelt containment (macOS engine tests)
    runs-on: macos-latest
    # Normal run is ~1 min; macOS minutes bill at 10× so a wedged run is the
    # most expensive way to find out something hung.
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      # The `@nightcore/*` workspace deps resolve through their package.json
      # `exports` (`./dist/index.js`), so a fresh checkout must BUILD the dep
      # chain before `bun test` can import them — otherwise bun reports
      # `Cannot find module '@nightcore/contracts'` and the whole suite errors
      # out (same reason apps/sidecar/scripts/compile.ts runs `tsc -b` first).
      # Scoped to `packages/engine`'s project references (contracts, storage,
      # shared) to keep premium macOS minutes small.
      - run: bunx tsc -b packages/engine
      - run: bun test packages/engine

  bun-checks:
    name: lint · typecheck · test (Bun workspace)
    runs-on: ubuntu-latest
    # ~1 min green. The web tier (the longest single step in CI) runs in the
    # parallel web-coverage job below so lint/type/test feedback isn't
    # serialized behind a 3-minute browser suite.
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      # --frozen-lockfile doubles as a lockfile-drift guard: it fails if bun.lock
      # is out of sync with the manifests.
      - run: bun install --frozen-lockfile
      # `bun run lint` = eslint-plugin build + `eslint .` + `lint:meta`. lint:meta
      # runs the codegen-drift rule (`gen-rust-contracts.ts --check`, the zod→Rust
      # guard) and agent-contract-parity. This is the "lint-meta fails CI" gate.
      - run: bun run lint
      - run: bun run typecheck
      # The node + plugin JS/TS tiers. The web tier runs in web-coverage; the
      # Rust tier in rust-checks. The node tier runs under a coverage floor so
      # a new module can't ship untested (tools/coverage/check-node-coverage.ts).
      # Plugin runs on vitest.
      - run: bun run test:node:coverage
      - run: bun run test:plugin

  web-coverage:
    name: vitest browser coverage (apps/web)
    runs-on: ubuntu-latest
    # ~3 min green (browser suite + coverage floor via Vitest istanbul
    # thresholds, apps/web/vitest.config.ts).
    timeout-minutes: 10
    steps:
      # ubuntu-24.04 runners advertise ~14GB free but real headroom varies VM
      # to VM: run 28756795439 ENOSPC'd 70% through this suite while the rerun
      # on an identical image version passed. The suite itself writes <100MB
      # (measured locally) — the margin is eaten by the preinstalled toolchains,
      # so drop the two big unused ones (~7GB for ~20s; the Android SDK is
      # bigger still but takes a minute to rm, not worth it). df lines bracket
      # the cleanup so a future ENOSPC is diagnosable from this log.
      - name: Free runner disk space
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /opt/hostedtoolcache/CodeQL
          df -h /
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      # apps/web resolves @nightcore/contracts + session-fold through their
      # package.json exports (./dist/index.js), so a fresh checkout must build
      # the dep chain before vite can serve the tests — the same reason the
      # macOS job runs `tsc -b packages/engine`. (bun-checks gets this for free
      # from `bun run typecheck`, which is a root `tsc -b`.)
      - run: bunx tsc -b apps/web
      # Vitest browser mode drives Playwright's own chromium build, which
      # runners don't ship. The ~100MB browser download is cached keyed on
      # bun.lock; on an exact hit only the distro shared libraries are
      # (re)installed (playwright install-deps), which is the cheap half of
      # `playwright install --with-deps`.
      - name: Cache Playwright chromium
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: playwright-${{ runner.os }}-
      # Run from apps/web so the isolated workspace layout resolves the
      # playwright package (it is apps/web's dep, not the root's).
      - name: Install Playwright chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps chromium
        working-directory: apps/web
      - name: Install Playwright system deps (browser cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: bunx playwright install-deps chromium
        working-directory: apps/web
      # Vite dep-optimize + vitest processed-module cache. A warm cache shaves
      # vitest startup and shrinks the mid-run dep-discovery window (the
      # silent-freeze mode documented on the coverage step). Restored after
      # bun install so the install can't clobber it; vite revalidates the
      # bundle hashes itself, so a stale restore just re-optimizes at startup.
      - name: Cache Vite/Vitest cache dir
        uses: actions/cache@v4
        with:
          path: apps/web/node_modules/.vite
          key: vite-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: vite-${{ runner.os }}-
      # Step-scoped timeout because this is the step with a known silent-freeze
      # mode: if Vite's dep optimizer discovers a dependency mid-run in a
      # browser project, the "optimized dependencies changed" reload kills the
      # in-flight test page and the vitest server waits on that file forever
      # with zero output. `react-dom/client` is pre-bundled against exactly
      # that (vitest.config.ts + .storybook/main.ts); the timeout turns any
      # residual hang (e.g. a newly-added dep — the vitest warning names the
      # culprit verbatim in the step log) into a fast red instead of a
      # job-timeout burn.
      - run: bun run test:web:coverage
        timeout-minutes: 7

  rust-checks:
    name: cargo test · clippy · fmt · ts-rs drift (Rust core)
    runs-on: ubuntu-latest
    # ~4 min with a warm cargo cache, but a cold cache (toolchain bump,
    # lockfile change, cache eviction) rebuilds the whole Tauri dep tree —
    # the ceiling is sized for that, not the warm path. If a legitimate cold
    # build ever trips this, bump it once rather than removing it.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      # Toolchain pinned to match apps/desktop/src-tauri/rust-toolchain.toml so
      # clippy -D warnings runs against a known release, not a floating stable.
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.1"
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri
      # Tauri v2 needs the WebKitGTK / GTK system libraries to compile on Linux.
      # --no-install-recommends skips the icon-theme/doc payload the GTK stack
      # recommends (~half the 55s install); the -dev packages hard-Depend on
      # everything the build actually links. If a future toolchain bump fails
      # with a missing-library error here, drop the flag before digging deeper.
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - run: bun install --frozen-lockfile
      # Style half of the Rust lint gate: rustfmt.toml pins the style, so a
      # formatting diff is a CI failure, not editor noise. Runs before the
      # compile steps because it needs no build artifacts.
      - name: cargo fmt --check
        run: cargo fmt --check
        working-directory: apps/desktop/src-tauri
      # `bun run test:rust` compiles the sidecar (Tauri externalBin) then runs
      # `cargo test`, which also re-exports the Rust structs into
      # apps/web/src/lib/generated/ via ts-rs.
      - run: bun run test:rust
      # Static-analysis half of the Rust lint gate — the TS side's error-or-off
      # discipline applied to Rust. Runs AFTER test:rust so the sidecar
      # externalBin exists (the Tauri build script requires it) and the cargo
      # cache is warm. Lives here, NOT in lint-meta: the Bun lint job has no
      # Tauri system deps and would red the gate.
      - name: cargo clippy -D warnings
        run: cargo clippy --all-targets -- -D warnings
        working-directory: apps/desktop/src-tauri
      # ts-rs regenerate-and-diff guard. cargo test rewrote the bindings above; if
      # they differ from what is committed, a Rust struct changed without the
      # generated TS being regenerated. This makes the "CI asserts no git diff"
      # claim in docs/architecture.md real.
      - name: Assert ts-rs bindings are in sync
        run: git diff --exit-code -- apps/web/src/lib/generated
